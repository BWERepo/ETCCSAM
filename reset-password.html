<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Silent Auction Manager — Reset Password</title>
<style>
  :root {
    --bg: #ffffff; --bg-section: #f5f5f7; --text: #1d1d1f; --text-secondary: #6e6e73;
    --accent: #0071e3; --accent-hover: #0077ed; --border: #d2d2d7; --danger: #c62828; --success: #1a7f37;
  }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text); margin: 0; padding: 40px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
  }
  .wrap { max-width: 420px; margin: 40px auto 0; }
  h1 { font-size: 22px; text-align: center; margin: 0 0 2px; }
  .sub { text-align: center; color: rgba(255,255,255,0.85); font-size: 13px; margin-bottom: 22px; }
  .panel { background: var(--bg); border-radius: 12px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .form-row { margin: 14px 0; }
  label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  input[type=password] {
    width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 6px;
    font-size: 14px; font-family: inherit; box-sizing: border-box; color: var(--text); background: var(--bg);
  }
  input[type=password]:focus { outline: none; border-color: var(--accent); }
  .btn {
    background: var(--accent); border: none; color: #fff; padding: 12px 18px; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .msg { border-radius: 6px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; text-align: left; }
  .msg.err { background: #fff5f5; border-left: 4px solid var(--danger); color: var(--danger); }
  .msg.ok { color: var(--success); font-weight: 600; text-align: center; }
  .back { display: block; text-align: center; margin-top: 18px; color: rgba(255,255,255,0.85); font-size: 13px; text-decoration: none; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Reset Password</h1>
  <div class="sub">Silent Auction Manager — East Tennessee Corvette Club</div>
  <div class="panel" id="panel">
    <p style="text-align:center;color:var(--text-secondary)">Checking your link…</p>
  </div>
  <a class="back" href="index.html">&larr; Back to login</a>
</div>
<script>
(function () {
  var panel = document.getElementById('panel');
  var params = new URLSearchParams(location.search);
  var token = params.get('token') || '';

  function renderForm(errorMsg) {
    panel.innerHTML =
      (errorMsg ? '<div class="msg err">' + errorMsg + '</div>' : '') +
      '<form id="reset-form">' +
      '  <div class="form-row">' +
      '    <label for="f-pw1">New Password</label>' +
      '    <input type="password" id="f-pw1" required minlength="6" autofocus>' +
      '  </div>' +
      '  <div class="form-row">' +
      '    <label for="f-pw2">Confirm New Password</label>' +
      '    <input type="password" id="f-pw2" required minlength="6">' +
      '  </div>' +
      '  <button type="submit" class="btn" id="reset-btn">Set New Password</button>' +
      '</form>';
    document.getElementById('reset-form').addEventListener('submit', function (e) {
      e.preventDefault();
      submitReset();
    });
  }

  function renderInvalid() {
    panel.innerHTML = '<div class="msg err">This reset link is invalid or has expired. Ask an administrator to use "Forgot password?" on the login screen to request a new one.</div>';
  }

  function renderDone() {
    panel.innerHTML = '<p class="msg ok">Password changed. You can log in with it now.</p>';
  }

  function submitReset() {
    var pw1 = document.getElementById('f-pw1').value;
    var pw2 = document.getElementById('f-pw2').value;
    var btn = document.getElementById('reset-btn');
    if (pw1 !== pw2) { renderForm('Passwords do not match.'); return; }
    if (pw1.length < 6) { renderForm('Password must be at least 6 characters.'); return; }
    btn.disabled = true;
    fetch('https://etccapps.com/apps/sam/api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset_password', token: token, password: pw1, password2: pw2 })
    }).then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.success) { renderDone(); }
        else { renderForm(data && data.error ? data.error : 'Could not reset the password. Try again.'); }
      })
      .catch(function () { renderForm('Could not reach the server. Try again in a moment.'); });
  }

  if (!token) {
    renderInvalid();
  } else {
    renderForm();
  }
})();
</script>
</body>
</html>
